<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloudflare IP Data</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            color: var(--text-main);
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 700;
        }

        /* 状态栏 */
        .status-bar {
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #ecfdf5;
            border-left: 4px solid var(--success-color);
            color: #065f46;
            border-radius: 4px;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        /* 控制区域 */
        .controls {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        select, input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        /* 按钮样式 */
        button#btnStart {
            grid-column: 1 / -1;
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 5px;
        }

        button#btnStart:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #9ca3af !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 进度条 */
        .progress-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 10px;
            margin: 20px 0;
            height: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(45deg, var(--primary-color) 25%, #60a5fa 25%, #60a5fa 50%, var(--primary-color) 50%, var(--primary-color) 75%, #60a5fa 75%, #60a5fa);
            background-size: 20px 20px;
            animation: stripe 1s linear infinite;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 11px;
            transition: width 0.3s ease;
        }

        @keyframes stripe {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }

        /* 选项卡 */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 内容区块 */
        .section-box {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 20px;
        }

        .section-box h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: normal;
        }

        /* 表格样式 */
        .scroll-table, .scroll-table-lg {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .scroll-table { max-height: 300px; }
        .scroll-table-lg { max-height: 500px; }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
            font-size: 14px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f9fafb;
            font-weight: 600;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f3f4f6; }

        /* 小按钮样式 */
        .action-btn {
            padding: 6px 12px;
            background-color: var(--warning-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
        }
        
        .action-btn:hover { opacity: 0.9; }
        .action-btn.selected { background-color: var(--success-color); }
        .action-btn:disabled { background-color: #d1d5db; color: #9ca3af; }

        /* 点击复制的样式 */
        .copy-ip {
            cursor: pointer;
            border-bottom: 1px dashed #9ca3af;
            position: relative;
            transition: all 0.2s;
        }
        .copy-ip:hover {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .copy-ip:active {
            opacity: 0.7;
        }

        /* 日志窗口 */
        .log-box {
            height: 200px;
            overflow-y: auto;
            background: #1e293b;
            color: #10b981;
            padding: 15px;
            border-radius: var(--radius);
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
            line-height: 1.4;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 状态标签 */
        .test-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .test-status.testing { background: #fef3c7; color: #d97706; }
        .test-status.done { background: #d1fae5; color: #059669; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.25rem; }
            .controls { grid-template-columns: 1fr 1fr; padding: 15px; }
            button#btnStart { margin-top: 10px; }
            th, td { padding: 10px; font-size: 13px; }
        }

        @media (max-width: 480px) {
            .controls { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloudflare IP Data</h1>
        
        <div class="status-bar" id="status">正在连接服务器...</div>
        
        <div class="controls">
            <div class="form-group">
                <label>IP类型</label>
                <select id="ipType">
                    <option value="4">IPv4</option>
                    <option value="6">IPv6</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>并发数</label>
                <input type="number" id="scanThreads" value="100" placeholder="默认100">
            </div>

            <div class="form-group">
                <label>端口与自定义协议</label>
                <select id="testPort" onchange="checkCustomPort()">
                    <optgroup label="HTTPS (默认固定的安全端口)">
                        <option value="443" selected>443</option>
                        <option value="2053">2053</option>
                        <option value="2083">2083</option>
                        <option value="2087">2087</option>
                        <option value="2096">2096</option>
                        <option value="8443">8443</option>
                    </optgroup>
                    <optgroup label="HTTPS (自定义输入任意端口)">
                        <option value="custom_https">✨ 框内输入任意 HTTPS 端口...</option>
                    </optgroup>
                    <optgroup label="HTTP (默认固定的明文端口)">
                        <option value="80">80</option>
                        <option value="8080">8080</option>
                        <option value="8880">8880</option>
                        <option value="2052">2052</option>
                        <option value="2082">2082</option>
                        <option value="2086">2086</option>
                        <option value="2095">2095</option>
                    </optgroup>
                    <optgroup label="HTTP (自定义输入任意端口)">
                        <option value="custom_http">✨ 框内输入任意 HTTP 端口...</option>
                    </optgroup>
                </select>
                <input type="number" id="customPortInput" placeholder="请输入任意端口号 (例如: 8888)" style="display: none; margin-top: 8px;">
            </div>

            <div class="form-group">
                <label>延迟阈值(ms)</label>
                <input type="number" id="testDelay" value="500" placeholder="默认500">
            </div>

            <div class="form-group">
                <label>测速 URL</label>
                <input type="text" id="speedUrl" value="speed.cloudflare.com/__down?bytes=100000000" placeholder="默认 speed.cloudflare.com/__down?bytes=100000000">
            </div>
            
            <button onclick="startUnifiedTask()" id="btnStart">开始扫描与测试</button>
            <button onclick="resetSpeedUrl()" id="btnResetSpeed" style="background-color:#6b7280;color:#fff;padding:10px;font-size:13px;border:none;border-radius:6px;cursor:pointer;">恢复默认测速 URL</button>
        </div>
        
        <div class="progress-container" id="progressBox">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('scan')">扫描结果</div>
            <div class="tab" onclick="switchTab('test')">详细测试</div>
        </div>

        <div id="scan" class="tab-content active">
            <div class="section-box" id="dcSection" style="display:none;">
                <h3>
                    数据中心汇总 
                    <span class="badge" id="dcCount">0</span>
                    <span id="currentTestDC" class="test-status" style="display:none;"></span>
                </h3>
                <p style="margin: 0 0 15px 0; color: var(--text-secondary); font-size: 13px;">
                    点击下方"选择测试"对指定数据中心的IP进行详细测速。
                </p>
                <div class="scroll-table">
                    <table id="dcTable">
                        <thead>
                            <tr>
                                <th>数据中心</th>
                                <th>地区</th>
                                <th>城市</th>
                                <th>IP数量</th>
                                <th>最低延迟</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <div class="section-box">
                <h3>实时扫描结果 <span class="badge" id="scanCount">0</span></h3>
                <div class="scroll-table-lg">
                    <table id="scanTable">
                        <thead>
                            <tr>
                                <th>IP地址 (点击复制)</th>
                                <th>数据中心</th>
                                <th>地区</th>
                                <th>城市</th>
                                <th>延迟</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="test" class="tab-content">
            <div class="section-box">
                <h3>
                    详细测试结果 
                    <span class="badge" id="testCount">0</span>
                    <span id="testingDC" style="margin-left: auto; color: var(--text-secondary); font-size: 12px; font-weight: normal;"></span>
                </h3>
                <p style="margin: 0 0 15px 0; color: var(--text-secondary); font-size: 13px;">
                    点击"测速"按钮对单个IP进行下载速度测试。点击IP可复制。
                </p>
                <div class="scroll-table-lg">
                    <table id="testTable">
                        <thead>
                            <tr>
                                <th>IP地址</th>
                                <th>丢包率</th>
                                <th>最小延迟</th>
                                <th>最大延迟</th>
                                <th>平均延迟</th>
                                <th>测速</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="log-box" id="logBox">
            <div>[系统] 等待操作...</div>
        </div>
    </div>

    <script>
        let ws;
        let scanResultsCount = 0;
        let testResultsCount = 0;
        let dcList = []; 
        let currentTestingDC = ''; 
        let testedDCs = new Set(); 
        
        let scanData = [];
        let testData = [];

        // 动态控制自定义输入框的显示与隐藏
        function checkCustomPort() {
            const select = document.getElementById('testPort');
            const customInput = document.getElementById('customPortInput');
            if (select.value === 'custom_https' || select.value === 'custom_http') {
                customInput.style.display = 'block';
                customInput.placeholder = select.value === 'custom_https' ? "请输入自定义 HTTPS 端口" : "请输入自定义 HTTP 端口";
                customInput.focus();
            } else {
                customInput.style.display = 'none';
            }
        }

        // 统一获取最终生效端口数字的辅助函数
        function getSelectedPort() {
            const select = document.getElementById('testPort');
            if (select.value === 'custom_https' || select.value === 'custom_http') {
                const val = parseInt(document.getElementById('customPortInput').value);
                return isNaN(val) ? (select.value === 'custom_https' ? 443 : 80) : val;
            }
            return parseInt(select.value);
        }

        // 统一判断当前的协议类型 (http / https)
        function getSelectedProtocol(port) {
            const select = document.getElementById('testPort').value;
            if (select === 'custom_https') return 'https';
            if (select === 'custom_http') return 'http';
            return [443, 2053, 2083, 2087, 2096, 8443].includes(port) ? 'https' : 'http';
        }

        function connect() {
            ws = new WebSocket("ws://" + window.location.host + "/ws");
            
            ws.onopen = () => {
                updateStatus("已连接服务器", true);
                log("已连接到服务器");
            };
            
            ws.onclose = () => {
                updateStatus("连接断开，3秒后重连...", false);
                log("连接断开，正在重连...");
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
        }

        function handleMessage(msg) {
            switch(msg.type) {
                case 'log':
                    log(msg.data);
                    break;
                case 'scan_progress':
                    updateProgress(msg.data.current, msg.data.total, "扫描中");
                    break;
                case 'scan_result':
                    addScanResult(msg.data);
                    break;
                case 'scan_complete_wait_dc':
                    sortAndRenderScanResults();
                    showDCSelection(msg.data);
                    break;
                case 'test_progress':
                    updateProgress(msg.data.current, msg.data.total, "测试中");
                    break;
                case 'test_result':
                    addTestResult(msg.data);
                    break;
                case 'test_complete':
                    testData = msg.data;
                    renderAllTestResults();
                    onTestComplete();
                    break;
                case 'speed_test_result':
                    updateSpeedResult(msg.data);
                    break;
                case 'task_complete':
                    log("任务全部完成");
                    resetButton("开始扫描与测试");
                    document.getElementById('progressBar').style.width = '100%';
                    document.getElementById('progressBar').textContent = '完成';
                    break;
                case 'error':
                    log("错误: " + msg.data);
                    resetButton("开始扫描与测试");
                    
                    const pb = document.getElementById('progressBar');
                    pb.style.background = '#ef4444';
                    pb.style.width = '100%';
                    pb.textContent = '任务失败';
                    break;
            }
        }
        
        function resetButton(text) {
            const btn = document.getElementById('btnStart');
            btn.disabled = false;
            btn.textContent = text;
        }

        function startUnifiedTask() {
            const ipType = parseInt(document.getElementById('ipType').value);
            const threads = parseInt(document.getElementById('scanThreads').value) || 100;
            const port = getSelectedPort(); // 升级：动态获取端口号
            const delay = parseInt(document.getElementById('testDelay').value) || 500;
            const speedUrlInput = document.getElementById('speedUrl');
            const speedUrl = speedUrlInput.value.trim();
            try {
                if (speedUrl) {
                    localStorage.setItem('cfdata_speed_url', speedUrl);
                    if (window.Android && typeof Android.saveSpeedUrl === 'function') {
                        Android.saveSpeedUrl(speedUrl);
                    }
                }
            } catch (e) {}
            
            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            btn.textContent = "扫描进行中...";
            
            document.querySelector('#scanTable tbody').innerHTML = '';
            document.querySelector('#testTable tbody').innerHTML = '';
            document.querySelector('#dcTable tbody').innerHTML = '';
            document.getElementById('dcSection').style.display = 'none';
            
            const pb = document.getElementById('progressBar');
            pb.style.background = ''; 
            pb.style.backgroundColor = '';
            
            scanResultsCount = 0;
            testResultsCount = 0;
            dcList = [];
            testedDCs.clear();
            currentTestingDC = '';
            
            scanData = [];
            testData = [];
            
            updateBadge('scanCount', 0);
            updateBadge('testCount', 0);
            updateBadge('dcCount', 0);
            
            switchTab('scan');

            const payload = {
                type: 'start_task',
                data: { ipType, threads, port, delay }
            };
            if (speedUrl) {
                payload.data.speedUrl = speedUrl;
            }

            ws.send(JSON.stringify(payload));
            
            document.getElementById('progressBox').style.display = 'block';
            updateProgress(0, 100, "准备中");
        }
        
        function showDCSelection(data) {
            dcList = data;
            renderDCTable();
            
            document.getElementById('dcSection').style.display = 'block';
            resetButton("重新开始扫描");
            document.getElementById('progressBar').textContent = '扫描完成，请选择数据中心';
            
            log("扫描完成，已按延迟排序，等待选择数据中心");
            document.getElementById('dcSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        function renderDCTable() {
            const tbody = document.querySelector('#dcTable tbody');
            tbody.innerHTML = '';
            
            dcList.forEach(dc => {
                const isTested = testedDCs.has(dc.DataCenter);
                const isTesting = currentTestingDC === dc.DataCenter;
                
                let btnHtml;
                if (isTesting) {
                    btnHtml = `<button class="action-btn" disabled>测试中...</button>`;
                } else if (isTested) {
                    btnHtml = `<button class="action-btn selected" onclick="selectDC('${dc.DataCenter}')">重新测试</button>`;
                } else {
                    btnHtml = `<button class="action-btn" onclick="selectDC('${dc.DataCenter}')">选择测试</button>`;
                }
                
                const row = `<tr id="dc-row-${dc.DataCenter}">
                    <td><strong>${dc.DataCenter}</strong></td>
                    <td>${dc.Region || ''}</td>
                    <td>${dc.City}</td>
                    <td>${dc.IPCount}</td>
                    <td>${dc.MinLatency} ms</td>
                    <td>${btnHtml}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
            
            updateBadge('dcCount', dcList.length);
        }

        function selectDC(dc) {
            const port = getSelectedPort(); // 升级：动态获取端口号
            const delay = parseInt(document.getElementById('testDelay').value);
            
            document.querySelector('#testTable tbody').innerHTML = '';
            testResultsCount = 0;
            updateBadge('testCount', 0);
            
            testData = [];
            
            currentTestingDC = dc;
            renderDCTable();
            
            document.getElementById('testingDC').textContent = `当前: ${dc}`;
            
            const statusSpan = document.getElementById('currentTestDC');
            statusSpan.textContent = `测试中: ${dc}`;
            statusSpan.className = 'test-status testing';
            statusSpan.style.display = 'inline-block';
            
            ws.send(JSON.stringify({
                type: 'start_test',
                data: { dc, port, delay }
            }));
            
            log("开始测试数据中心: " + dc);
            switchTab('test');
        }
        
        function onTestComplete() {
            if (currentTestingDC) {
                testedDCs.add(currentTestingDC);
                log(`数据中心 ${currentTestingDC} 测试完成，已排序`);
            }
            
            currentTestingDC = '';
            renderDCTable();
            
            const statusSpan = document.getElementById('currentTestDC');
            statusSpan.textContent = '当前测试完成';
            statusSpan.className = 'test-status done';
            
            document.getElementById('progressBar').textContent = '测试完成';
        }

        function runSpeedTest(ip) {
            const ipId = ip.replace(/:/g, '_').replace(/\./g, '_');
            const btn = document.getElementById('btn-speed-' + ipId);
            if(btn) {
                btn.innerHTML = "⏳ 测速中...";
                btn.disabled = true;
                btn.style.backgroundColor = "#4b5563"; 
                btn.style.color = "#ffffff";
            }
            
            const port = getSelectedPort(); // 升级：获取端口号
            const speedUrlInput = document.getElementById('speedUrl');
            let speedUrl = speedUrlInput ? speedUrlInput.value.trim() : "";

            if (speedUrl) {
                try {
                    localStorage.setItem('cfdata_speed_url', speedUrl);
                    if (window.Android && typeof Android.saveSpeedUrl === 'function') {
                        Android.saveSpeedUrl(speedUrl);
                    }
                } catch (e) {}
            }

            // 核心功能升级：提取并纠正测速链接的协议前缀
            const customProtocol = getSelectedProtocol(port);
            let finalSpeedUrl = speedUrl;
            if (speedUrl && !speedUrl.startsWith('http://') && !speedUrl.startsWith('https://')) {
                finalSpeedUrl = customProtocol + "://" + speedUrl;
            }

            ws.send(JSON.stringify({
                type: 'start_speed_test',
                data: { ip, port, speedUrl: finalSpeedUrl }
            }));
        }

        // 复制 IP 功能
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = element.textContent;
                element.textContent = "已复制!";
                element.style.color = "var(--success-color)";
                element.style.fontWeight = "bold";
                
                setTimeout(() => {
                    element.textContent = originalText;
                    element.style.color = "";
                    element.style.fontWeight = "";
                }, 1000);
            }).catch(err => {
                console.error('Copy failed', err);
            });
        }

        function resetSpeedUrl() {
            const input = document.getElementById('speedUrl');
            if (!input) return;
            const def = "speed.cloudflare.com/__down?bytes=100000000";
            input.value = def;
            try {
                localStorage.removeItem('cfdata_speed_url');
                if (window.Android && typeof Android.saveSpeedUrl === 'function') {
                    Android.saveSpeedUrl(def);
                }
            } catch (e) {}
            log("已恢复默认测速 URL");
        }

        function renderTestRow(res) {

            const row = `<tr>

        function getLatencyColor(latencyStr) {
            const latency = parseFloat(latencyStr);
            if(isNaN(latency)) return 'inherit';
            if(latency < 100) return '#10b981'; 
            if(latency < 200) return '#f59e0b'; 
            return '#ef4444'; 
        }

        function updateSpeedResult(data) {
            const ipId = data.ip.replace(/:/g, '_').replace(/\./g, '_');
            const cell = document.getElementById('speed-cell-' + ipId);
            if (cell) {
                let color = '#1f2937';
                if(data.speed.includes('MB/s')) {
                    const val = parseFloat(data.speed);
                    if(val > 10) color = '#10b981';
                    else if(val > 5) color = '#f59e0b';
                }
                cell.innerHTML = `<strong style="color:${color}">${data.speed}</strong>`;
            }
        }
        
        function updateBadge(id, count) {
            document.getElementById(id).textContent = count;
        }

            const bar = document.getElementById('progressBar');
            const percent = Math.round((current / total) * 100) + '%';
            bar.style.width = percent;
            bar.textContent = `${statusText} ${percent}`;
        }
