    - name: Setup Gradle Project
      run: |
        # 1. 生成 settings.gradle，加入完整的仓库源，这是解决插件找不到和库解析失败的核心
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':main'
        EOF
        
        # 2. 生成根 build.gradle
        echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
        
        # 3. 生成 main/build.gradle
        cat << 'EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cfdata'
            compileSdk 34
            defaultConfig {
                minSdk 21
                targetSdk 34
            }
        }
        dependencies {
            implementation files('libs/cfdata.aar')
        }
        EOF
