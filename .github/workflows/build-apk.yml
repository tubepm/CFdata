name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (降级为完美适配 Gradle 8 的 JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 将你的 cfdata 编译绑定为标准的安卓原生插件包 (.aar)
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 降级安装官方成熟稳定的 Gradle 8.0 (彻底避开 9.5.1 的致命警告拦截)
    - name: Setup Gradle 8.0
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0'

    # 8. 重新生成高度兼容的 Gradle 配置文件
    - name: Auto Generate Android Gradle Build Files
      run: |
        # 1. 兼容 Gradle 8.x 的 settings.gradle
        cat << 'EOF' > main/settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
                flatDir {
                    dirs 'libs'
                }
            }
        }
        rootProject.name = 'cfdata'
        EOF
        
        # 2. 兼容传统的 build.gradle 声明
        cat << 'EOF' > main/build.gradle
        plugins {
            id 'com.android.application' version '8.0.2'
            id 'org.jetbrains.kotlin.android' version '1.8.20'
        }
        
        android {
            namespace 'com.cfdata'
            compileSdk 33
        
            defaultConfig {
                applicationId "com.cfdata"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.9.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    # 9. 执行打包 (调用刚刚下载的稳定的 gradle 8.0 纯净命令)
    - name: Build APK with Gradle 8.0
      run: |
        cd main
        gradle assembleDebug --warning-mode none -x lint

    # 10. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        }
        
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    # 8. 【核心改变】使用强力容错参数进行构建，屏蔽过时警告造成的打断
    - name: Build APK with System Gradle
      run: |
        cd main
        gradle assembleDebug -x lint -x test --warning-mode none

    # 9. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
