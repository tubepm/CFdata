    - name: Verify AAR Contents
      run: |
        cd main/libs
        echo "=== AndroidManifest.xml ==="
        unzip -p cfdata.aar AndroidManifest.xml
        echo ""
        echo "=== Classes in AAR ==="
        unzip -p cfdata.aar classes.jar > /tmp/classes.jar
        jar tf /tmp/classes.jar | grep "\.class" | sort
          '    compileOptions {' \
          '        sourceCompatibility JavaVersion.VERSION_17' \
          '        targetCompatibility JavaVersion.VERSION_17' \
          '    }' \
          "    kotlinOptions { jvmTarget = '17' }" \
          '    lint {' \
          '        abortOnError false' \
          '        checkReleaseBuilds false' \
          '    }' \
          '}' \
          'dependencies {' \
          "    implementation(name: 'cfdata', ext: 'aar')" \
          "    implementation 'androidx.core:core-ktx:1.12.0'" \
          "    implementation 'androidx.appcompat:appcompat:1.6.1'" \
          "    implementation 'com.google.android.material:material:1.11.0'" \
          '}' \
          > main/build.gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2 --distribution-type bin

    - name: Build APK with Gradle
      run: |
        ./gradlew :main:assembleDebug --stacktrace -x lint -x test --warning-mode none --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
