name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (Android 编译底座)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 【核心黑科技】云端热修复：把 package cfdata 变成 package main，并追加 main 入口
    # 这样既不污染你本地的代码，又能骗过 gomobile 让它乖乖编译
    - name: Patch Package to Main
      run: |
        # 将第一行的 package cfdata 替换为 package main
        sed -i 's/package cfdata/package main/g' cfdata.go
        
        # 在 cfdata.go 的末尾追加一个合法的 main 函数入口，去启动你的服务
        # 假设你的服务是通过 StartServer 启动的（或者是项目里其他的启动函数）
        echo -e "\nfunc main() {\n\t// 这里的端口可以根据你的 index.html 匹配，通常混合应用在手机端后台盲跑\n\tStartServer(\"127.0.0.1:8080\")\n}" >> cfdata.go
        
        echo "=== 检查修改后的 Go 文件前几行 ==="
        head -n 5 cfdata.go
        echo "=== 检查修改后的 Go 文件末尾几行 ==="
        tail -n 10 cfdata.go

    # 7. 融合 main 文件夹里的安卓资源，直接编译成最终 APK
    - name: Build APK via Go Mobile
      run: |
        # -androidapi 21 解决 NDK 版本冲突
        # . 代表编译当前根目录
        gomobile build -target=android -androidapi 21 -o cfdata.apk .

    # 8. 上传生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
