name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 将你的 cfdata 编译绑定为标准的安卓原生插件包 (.aar)
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 【终极防卡】极致精简生成，彻底删除所有带冒号的 dependencies
    - name: Auto Generate Top-Level and App Gradle Files
      run: |
        # 1. 创建顶层 settings.gradle
        cat << 'SETTING_EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':main'
        SETTING_EOF
        
        # 2. 创建主 build.gradle (指定稳定的 8.2.2 框架插件)
        cat << 'ROOT_EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        ROOT_EOF
        
        # 3. 创建 main 目录下的纯净版 build.gradle (不带任何三方包依赖声明)
        cat << 'APP_EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cfdata'
            compileSdk 34
            defaultConfig {
                applicationId 'com.cfdata'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            lint {
                abortOnError false
                checkReleaseBuilds false
            }
        }
        dependencies {
            implementation files('libs/cfdata.aar')
        }
        APP_EOF

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
