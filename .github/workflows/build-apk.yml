name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (Gradle 打包必须)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 【核心改变】加入 -androidapi 21 解决 NDK 版本冲突
    - name: Bind Go to Android Library
      run: |
        gomobile bind -target=android/arm64 -androidapi 21 -o main/cfdata.aar .

    # 7. 使用 Android 命令行打包工具（Gradle）将外壳和库融合，编译生成 APK
    - name: Build APK with Gradle
      run: |
        cd main
        if [ -f "./gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          gradle assembleDebug || echo "尝试使用原生标准构建..."
          cd ..
          gomobile build -target=android -androidapi 21 -o cfdata.apk .
        fi

    # 8. 收集和寻找编译生成的 APK 并上传
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: |
          *.apk
          main/build/outputs/apk/debug/*.apk
