name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 支持手动一键触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 屏蔽 2026 年 Node 废弃警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        # 自动寻找并绑定 GitHub 虚拟机自带的 NDK 路径
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已自动绑定为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Setup Go Module and Sanitize Code
      run: |
        # 1. 核心修复：防止之前残留在虚拟机或缓存里的多余 main.go 干扰，直接强制删掉它
        rm -f main.go || true
        
        # 2. 确保你的核心文件第一行是标准的 package main，不管大写小写都给纠正过来
        sed -i 's/Package main/package main/g' cfdata.go
        sed -i 's/package cfdata/package main/g' cfdata.go
        
        # 3. 规范化初始化依赖关系
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 4. 目录此时无比干净，只有唯一的 cfdata.go 和 index.html，直接整包一键输出 APK！
        gomobile build -target=android -o cfdata.apk .
        
    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
