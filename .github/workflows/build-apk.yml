name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (Android NDK 必备底座)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 【高能黑科技】动态注入标准的 gomobile app 窗口生命周期
    # 直接让 cfdata.go 拥有合法的 package main 和底层安卓生命周期接管能力
    - name: Inject Android App Lifecycle into Go
      run: |
        # 1. 强行改成 package main
        sed -i 's/package cfdata/package main/g' cfdata.go
        
        # 2. 在文件末尾追加合法的 main 函数与安卓原生 app 窗口事件监听
        cat << 'EOF' >> cfdata.go

import "golang.org/x/mobile/app"

func main() {
	// 在后台异步拉起你的高性能测速服务
	go StartServer(8080, "127.0.0.1")

	// 阻塞并接管安卓应用生命周期，让系统承认它是一个合法的、有生存权的 App
	app.Main(func(a app.App) {
		for range a.Events() {
			// 手机端保持后台不灭即可
		}
	})
}
EOF
        echo "=== 检查动态注入后的源码尾部 ==="
        tail -n 25 cfdata.go

    # 7. 越过所有 Gradle 垃圾配置，直接使用 Go 交叉编译引擎生成 APK！
    - name: Pure Go Build APK
      run: |
        # -androidapi 21 规避新版 NDK 的过旧版本拦截错误
        gomobile build -target=android -androidapi 21 -o cfdata.apk .

    # 8. 上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.9.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    # 9. 执行打包 (调用刚刚下载的稳定的 gradle 8.0 纯净命令)
    - name: Build APK with Gradle 8.0
      run: |
        cd main
        gradle assembleDebug --warning-mode none -x lint

    # 10. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.9.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.8.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    # 9. 执行打包 (调用刚刚下载的稳定的 gradle 8.0 纯净命令)
    - name: Build APK with Gradle 8.0
      run: |
        cd main
        gradle assembleDebug --warning-mode none -x lint

    # 10. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        }
        
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

    # 8. 【核心改变】使用强力容错参数进行构建，屏蔽过时警告造成的打断
    - name: Build APK with System Gradle
      run: |
        cd main
        gradle assembleDebug -x lint -x test --warning-mode none

    # 9. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
