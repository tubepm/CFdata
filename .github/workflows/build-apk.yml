name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Go Library
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          mkdir -p main/libs
          gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

      - name: Configure Project
        run: |
          # 强制生成 Gradle 8.5 环境，规避 9.x 版本的兼容性问题
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          
          # 创建标准的 settings.gradle
          cat << 'EOF' > settings.gradle
          rootProject.name = 'cfdata-project'
          include ':main'
          EOF
          
          # 创建根目录构建配置
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF
          
          # 创建子模块构建配置
          mkdir -p main
          cat << 'EOF' > main/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.cfdata'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.cfdata'
                  minSdk 21
                  targetSdk 34
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.aar'])
              implementation 'androidx.core:core-ktx:1.12.0'
          }
          EOF

      - name: Build APK
        run: |
          # 必须清理环境，且使用 ./gradlew 确保使用刚才生成的 8.5 版本
          rm -rf .gradle build main/.gradle main/build
          ./gradlew :main:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-ip-data-apk
          path: main/build/outputs/apk/debug/*.apk
