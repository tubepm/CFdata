name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Clean Code
      run: |
        # 1. 彻底删掉之前脚本在虚拟机里生成的干扰文件 main.go 和模块缓存
        rm -f main.go go.mod go.sum build.sh || true
        
        # 2. 核心拯救：强行把 cfdata.go 恢复到你 Git 仓库里最纯净、没有被追加破坏的状态
        git checkout -- cfdata.go || true
        
        # 3. 顺应编译要求：确保文件首行包名是 package main（如果原本是 cfdata 就换成 main）
        sed -i '1s/^package .*/package main/' cfdata.go

    - name: Initialize Modules
      run: |
        # 4. 以最标准的 package main 模块环境拉取依赖
        go mod init main
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 5. 纯净编译你原本的代码包，不掺杂任何多余文件
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
