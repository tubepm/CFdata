name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Clean And Restore Code
      run: |
        # 1. 彻底清除之前生成的残留干扰文件
        rm -f go.mod go.sum main.go index.html || true
        
        # 2. 强行把你的 cfdata.go 恢复到最干净、健康的原始状态
        git checkout -- cfdata.go || true

        # 3. 将包名强制变更为标准的 package main，以便 gomobile 直接构建独立应用
        sed -i '1s/^Package .*/package main/' cfdata.go
        sed -i '1s/^package .*/package main/' cfdata.go

        # 4. 确保 index.html 存在，防 embed 报错
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>CFdata Android</body></html>' > index.html
        fi

    - name: Auto Create Main Entry
      run: |
        # 5. 用最纯净、绝不飘红线的 echo 方式逐行生成 main.go 入口文件
        echo "package main" > main.go
        echo "import (" >> main.go
        echo "	\"log\"" >> main.go
        echo "	\"golang.org/x/mobile/app\"" >> main.go
        echo ")" >> main.go
        echo "func main() {" >> main.go
        echo "	go func() {" >> main.go
        echo "		log.Println(\"正在启动 CFdata 后台监听服务...\")" >> main.go
        echo "		StartServer(8080)" >> main.go
        echo "	}()" >> main.go
        echo "	app.Main(func(a app.App) {" >> main.go
        echo "		for range a.Events() {}" >> main.go
        echo "	})" >> main.go
        echo "}" >> main.go

    - name: Initialize Modules
      run: |
        # 6. 初始化 go 模块并拉取你在 cfdata.go 中需要的 websocket 依赖包
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 7. 整包编译当前目录，并强制指定支持 API 21 绕过高版本 NDK 限制
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
