name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 支持在网页上手动点击按钮一键触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 屏蔽 2026 年 Node 废弃警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Gomobile and Android SDK Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init

    - name: Setup Go Module and Fix Case Issue
      run: |
        # 强制将 cfdata.go 里的首字母大写 Package 替换为标准小写 package，防止手误
        sed -i 's/^Package main/package main/g' cfdata.go
        
        # 清理并规范化模块依赖关系
        rm -f go.mod go.sum || true
        go mod init cfdata
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        # 编译当前 main 包为独立的安卓应用成品
        gomobile build -target=android -o cfdata.apk .

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
