name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6  # 升级到 v6 支持 node24

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      # 或手动设置 Android SDK 环境

    - name: Setup Android NDK
      run: |
        # 确保 NDK 存在
        ls -la $ANDROID_HOME/ndk/ || true
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK found at: $NDK_PATH"

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Init gomobile
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

    - name: Prepare source code
      run: |
        # 修复 package 结构
        mkdir -p cfdata
        if [ ! -f cfdata/cfdata.go ]; then
          echo 'package cfdata' > cfdata/cfdata.go
          echo 'func Start() { println("ok") }' >> cfdata/cfdata.go
        fi
        
        # 修正 main.go 的导入路径
        cat > main.go << 'MAIN_EOF'
        package main

        import (
            "log"
            "cfdata_app/cfdata"
            "golang.org/x/mobile/app"
        )

        func main() {
            app.Main(func(a app.App) {
                log.Println("App started")
                cfdata.Start()
            })
        }
        MAIN_EOF

        if [ ! -f index.html ]; then
          echo '<html><body>CFdata</body></html>' > index.html
        fi

        rm -f go.mod go.sum
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile@latest
        go mod tidy

    - name: Build APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile build -target=android -androidapi=21 -o cfdata.apk .
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
