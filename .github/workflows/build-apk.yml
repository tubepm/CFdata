name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出你的源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 语言环境（修正为官方正确的 actions/setup-go）
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境（Android 编译底层依赖 Java）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 显式安装和配置 Android NDK
    # gomobile 交叉编译必须要 NDK，我们用这个 action 自动下载并配置好环境变量
    - name: Setup Android NDK
      uses: nndg/setup-ndk@v2
      with:
        ndk-version: r26b # 这是一个稳定且与新版 Go 兼容性很好的 NDK 版本

    # 5. 安装 gomobile 工具
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    # 6. 初始化 gomobile
    - name: Initialize Go Mobile
      run: |
        # ANDROID_NDK_HOME 变量会由上一步的 setup-ndk 自动注入
        gomobile init

    # 7. 编译生成 APK
    - name: Build APK
      run: |
        # 再次提醒：如果你的 main.go 就在根目录，请把下面的 ./main 改成 .
        gomobile build -target=android -o cfdata.apk ./main

    # 8. 将编译好的 APK 上传到 GitHub Artifacts
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
