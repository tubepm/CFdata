name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 【重磅调整】不限制 target 架构，让 gomobile 生成最全、最标准的完整版 aar 插件
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -androidapi 21 -o main/libs/cfdata.aar .
        echo "=== 检查 aar 文件是否确实生成成功 ==="
        ls -la main/libs/

    # 7. 全自动补全大项目 Gradle 配置文件
    - name: Auto Generate Top-Level and App Gradle Files
      run: |
        # 1. 创建顶层 settings.gradle
        cat << 'SETTING_EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
                // 【核心补丁】将 libs 仓库声明在全局依赖池中，让 Gradle 自动以库的形式检索它
                flatDir {
                    dirs 'main/libs'
                }
            }
        }
        include ':main'
        SETTING_EOF
        
        # 2. 创建主 build.gradle (指定稳定的 8.2.2 框架插件)
        cat << 'ROOT_EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        ROOT_EOF
        
        # 3. 创建 main 目录下的 build.gradle
        cat << 'APP_EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cfdata'
            compileSdk 34
            defaultConfig {
                applicationId 'com.cfdata'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            lint {
                abortOnError false
                checkReleaseBuilds false
            }
        }
        dependencies {
            // 【终极防错】抛弃死板的 files() 强验证，改用标准的 name 动态链接引入
            // 这样 Gradle 会在全局依赖池中动态寻找 cfdata.aar，绝不会再报输入文件不存在！
            implementation (name: 'cfdata', ext: 'aar')
        }
        APP_EOF

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
