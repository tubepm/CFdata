name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 将你的 cfdata 编译绑定为标准的安卓原生插件包 (.aar)
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 全自动补全大项目 Gradle 配置文件（采用全新的现代高版本兼容语法）
    - name: Auto Generate Top-Level and App Gradle Files
      run: |
        # 1. 在项目真正的根目录生成 settings.gradle
        echo "pluginManagement {" > settings.gradle
        echo "    repositories {" >> settings.gradle
        echo "        google()" >> settings.gradle
        echo "        mavenCentral()" >> settings.gradle
        echo "        gradlePluginPortal()" >> settings.gradle
        echo "    }" >> settings.gradle
        echo "}" >> settings.gradle
        echo "dependencyResolutionManagement {" >> settings.gradle
        echo "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)" >> settings.gradle
        echo "    repositories {" >> settings.gradle
        echo "        google()" >> settings.gradle
        echo "        mavenCentral()" >> settings.gradle
        echo "    }" >> settings.gradle
        echo "}" >> settings.gradle
        echo "include ':main'" >> settings.gradle
        
        # 2. 在项目真正的根目录生成主 build.gradle，使用成熟好用的 8.2.2 插件
        echo "plugins {" > build.gradle
        echo "    id 'com.android.application' version '8.2.2' apply false" >> build.gradle
        echo "    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false" >> build.gradle
        echo "}" >> build.gradle
        
        # 3. 重新规范化 main 子目录下的 build.gradle
        echo "plugins {" > main/build.gradle
        echo "    id 'com.android.application'" >> main/build.gradle
        echo "    id 'org.jetbrains.kotlin.android'" >> main/build.gradle
        echo "}" >> main/build.gradle
        echo "android {" >> main/build.gradle
        echo "    namespace 'com.cfdata'" >> main/build.gradle
        echo "    compileSdk 34" >> main/build.gradle
        echo "    defaultConfig {" >> main/build.gradle
        echo "        applicationId 'com.cfdata'" >> main/build.gradle
        echo "        minSdk 21" >> main/build.gradle
        echo "        targetSdk 34" >> main/build.gradle
        echo "        versionCode 1" >> main/build.gradle
        echo "        versionName '1.0'" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    buildTypes {" >> main/build.gradle
        echo "        release {" >> main/build.gradle
        echo "            minifyEnabled false" >> main/build.gradle
        echo "        }" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    compileOptions {" >> main/build.gradle
        echo "        sourceCompatibility JavaVersion.VERSION_17" >> main/build.gradle
        echo "        targetCompatibility JavaVersion.VERSION_17" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    kotlinOptions {" >> main/build.gradle
        echo "        jvmTarget = '17'" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    lint {" >> main/build.gradle
        echo "        abortOnError false" >> main/build.gradle
        echo "        checkReleaseBuilds false" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "}" >> main/build.gradle
        
        # 4. 彻底修复冲突！改用高版本完美支持的 files() 精准引入方式
        echo "dependencies {" >> main/build.gradle
        echo "    implementation files('libs/cfdata.aar')" >> main/build.gradle
        echo "    implementation 'androidx.core:core-ktx:1.12.0'" >> main/build.gradle
        echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.11.0'" >> main/build.gradle
        echo "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" >> main/build.gradle
        echo "}" >> main/build.gradle

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        echo "}" >> main/build.gradle
        echo "dependencies {" >> main/build.gradle
        echo "    implementation fileTree(dir: 'libs', include: ['*.aar'])" >> main/build.gradle
        echo "    implementation 'androidx.core:core-ktx:1.10.1'" >> main/build.gradle
        echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.9.0'" >> main/build.gradle
        echo "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" >> main/build.gradle
        echo "}" >> main/build.gradle

    # 8. 【核弹级绝杀】在当前目录一键生成官方独立的 Gradle 8.4 包装器 (Wrapper)
    # 彻底架空并抛弃系统全局那傲娇、脆弱的 9.5.1
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的、完全独立的、带绝对容错标识的本地包装器命令一键强行打包
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug --stacktrace --info -x lint -x test --warning-mode none

    # 10. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
