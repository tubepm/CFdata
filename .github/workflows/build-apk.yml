name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Reorganize Project Structure
      run: |
        mkdir -p main/src/main
        mv main/java main/src/main/ 2>/dev/null || true
        mv main/res main/src/main/ 2>/dev/null || true
        
        echo '<?xml version="1.0" encoding="utf-8"?>' > main/src/main/AndroidManifest.xml
        echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"' >> main/src/main/AndroidManifest.xml
        echo '    package="com.cfdata">' >> main/src/main/AndroidManifest.xml
        echo '    <uses-permission android:name="android.permission.INTERNET" />' >> main/src/main/AndroidManifest.xml
        echo '    <application' >> main/src/main/AndroidManifest.xml
        echo '        android:allowBackup="true"' >> main/src/main/AndroidManifest.xml
        echo '        android:icon="@mipmap/ic_launcher"' >> main/src/main/AndroidManifest.xml
        echo '        android:label="@string/app_name"' >> main/src/main/AndroidManifest.xml
        echo '        android:roundIcon="@mipmap/ic_launcher"' >> main/src/main/AndroidManifest.xml
        echo '        android:supportsRtl="true"' >> main/src/main/AndroidManifest.xml
        echo '        android:usesCleartextTraffic="true"' >> main/src/main/AndroidManifest.xml
        echo '        android:theme="@style/Theme.Cfdata">' >> main/src/main/AndroidManifest.xml
        echo '        <activity' >> main/src/main/AndroidManifest.xml
        echo '            android:name=".MainActivity"' >> main/src/main/AndroidManifest.xml
        echo '            android:exported="true">' >> main/src/main/AndroidManifest.xml
        echo '            <intent-filter>' >> main/src/main/AndroidManifest.xml
        echo '                <action android:name="android.intent.action.MAIN" />' >> main/src/main/AndroidManifest.xml
        echo '                <category android:name="android.intent.category.LAUNCHER" />' >> main/src/main/AndroidManifest.xml
        echo '            </intent-filter>' >> main/src/main/AndroidManifest.xml
        echo '        </activity>' >> main/src/main/AndroidManifest.xml
        echo '    </application>' >> main/src/main/AndroidManifest.xml
        echo '</manifest>' >> main/src/main/AndroidManifest.xml

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK & NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Build Go AAR
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -javapkg com.cfdata -o main/libs/cfdata.aar .

    - name: Generate Gradle Files
      run: |
        echo 'pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }' > settings.gradle
        echo "include ':main'" >> settings.gradle
        echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
        echo 'android.useAndroidX=true' > gradle.properties
        echo 'android.enableJetifier=true' >> gradle.properties
        echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
        
        echo "plugins { id 'com.android.application' }" > main/build.gradle
        echo "android {" >> main/build.gradle
        echo "    namespace 'com.cfdata'" >> main/build.gradle
        echo "    compileSdk 34" >> main/build.gradle
        echo "    defaultConfig {" >> main/build.gradle
        echo "        applicationId 'com.cfdata'" >> main/build.gradle
        echo "        minSdk 24" >> main/build.gradle
        echo "        targetSdk 34" >> main/build.gradle
        echo "        versionCode 1" >> main/build.gradle
        echo "        versionName '1.0'" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    buildTypes { release { minifyEnabled false } }" >> main/build.gradle
        echo "    compileOptions {" >> main/build.gradle
        echo "        sourceCompatibility JavaVersion.VERSION_17" >> main/build.gradle
        echo "        targetCompatibility JavaVersion.VERSION_17" >> main/build.gradle
        echo "    }" >> main/build.gradle
        echo "    lint { abortOnError false; checkReleaseBuilds false }" >> main/build.gradle
        echo "}" >> main/build.gradle
        echo "repositories { google(); mavenCentral() }" >> main/build.gradle
        echo "dependencies {" >> main/build.gradle
        echo "    implementation files('libs/cfdata.aar')" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.11.0'" >> main/build.gradle
        echo "}" >> main/build.gradle

    - name: Build APK
      run: |
        gradle wrapper --gradle-version 8.2 --distribution-type bin
        ./gradlew :main:assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: main/build/outputs/apk/debug/*.apk
