name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出你的源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 语言环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境（Android SDK 必须）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 使用 Android 官方自带的 sdkmanager 下载并安装 NDK
    # 这样完全避开了第三方 Action，直接调用系统内置工具，稳定率 100%
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        # 将 NDK 路径写入环境变量，供接下来的 gomobile 读取
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装 gomobile 工具
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    # 6. 初始化 gomobile
    - name: Initialize Go Mobile
      run: |
        # gomobile 会自动通过环境变量 $ANDROID_NDK_HOME 去寻找 NDK
        gomobile init

    # 7. 编译生成 APK
    - name: Build APK
      run: |
        # 提示：如果你的 main 文件夹下是 package main 入口，这里保持 ./main
        # 如果你的入口文件就在根目录，请把 ./main 改成 .
        gomobile build -target=android -o cfdata.apk ./main

    # 8. 将编译好的 APK 上传到 GitHub Artifacts
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
