name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Run Build Script
      run: |
        cat << 'INNER_EOF' > build.sh
        #!/bin/bash
        rm -f go.mod go.sum main.go || true
        git checkout -- cfdata.go || true
        
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body><h1>CFdata Android Running</h1></body></html>' > index.html
        fi
        
        # 1. 修正包名
        sed -i '1s/^package .*/package main/' cfdata.go
        
        # 2. 注入标准依赖，不带斜杠地引入核心 lifecycle
        sed -i '/import (/a \	"golang.org/x/mobile/app"\n	"golang.org/x/mobile/event/lifecycle"' cfdata.go
        
        # 3. 把默认地址直接作为变量写进 Go 代码。彻底避免在 echo 里面传双引号和长链接触发红线！
        echo "" >> cfdata.go
        echo "var defaultURL = \`speed.cloudflare.com/__down?bytes=100000000\`" >> cfdata.go
        echo "func main() {" >> cfdata.go
        echo "	go StartServer(8080, defaultURL)" >> cfdata.go
        echo "	app.Main(func(a app.App) {" >> cfdata.go
        echo "		for change := range a.Events() {" >> cfdata.go
        echo "			switch e := a.Filter(change).(type) {" >> cfdata.go
        echo "			case lifecycle.Event:" >> cfdata.go
        echo "				if e.Crosses(lifecycle.StageFocused) == lifecycle.CrossWith {" >> cfdata.go
        echo "					go func() {" >> cfdata.go
        echo "						a.OpenURL(\`http://127.0.0.1:8080\`)" >> cfdata.go
        echo "					}()" >> cfdata.go
        echo "				}" >> cfdata.go
        echo "			}" >> cfdata.go
        echo "		}" >> cfdata.go
        echo "	})" >> cfdata.go
        echo "}" >> cfdata.go
        
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile/app
        go get golang.org/x/mobile/event/lifecycle
        go mod tidy
        INNER_EOF
        
        # 运行构建
        bash build.sh

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
