name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build Go Library
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          mkdir -p main/libs
          gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

      - name: Prepare Gradle Configuration
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral(); flatDir { dirs 'main/libs' } }
          }
          include ':main'
          EOF
          
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF
          
          mkdir -p main
          cat << 'EOF' > main/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.cfdata'; compileSdk 34
              defaultConfig { applicationId 'com.cfdata'; minSdk 21; targetSdk 34 }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              lint { abortOnError false }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.aar'])
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK with Gradle
        run: |
          # 彻底清理环境
          rm -rf .gradle build main/.gradle main/build
          # 运行构建，取消缓存和守护进程
          gradle :main:assembleDebug --no-build-cache --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-ip-data-apk
          path: main/build/outputs/apk/debug/*.apk
