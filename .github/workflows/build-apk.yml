name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 将你的 cfdata 编译绑定为标准的安卓原生插件包 (.aar)
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 【终极防错】使用标准的项目级别隔离生成，用最安全的 8.2.2 环境直接构建
    - name: Auto Generate Top-Level and App Gradle Files
      run: |
        # 1. 创建顶层 settings.gradle
        cat << 'SETTING_EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':main'
        SETTING_EOF
        
        # 2. 创建主 build.gradle
        cat << 'ROOT_EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
        ROOT_EOF
        
        # 3. 创建 main 目录下的 build.gradle
        cat << 'APP_EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cfdata'
            compileSdk 34
            defaultConfig {
                applicationId 'com.cfdata'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            lint {
                abortOnError false
                checkReleaseBuilds false
            }
        }
        dependencies {
            implementation files('libs/cfdata.aar')
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        APP_EOF

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        
        # 4. 精准引入，彻底移除带有特殊符号的全局降级闭包
        echo "dependencies {" >> main/build.gradle
        echo "    implementation files('libs/cfdata.aar')" >> main/build.gradle
        echo "    implementation 'androidx.core:core-ktx:1.12.0'" >> main/build.gradle
        echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.11.0'" >> main/build.gradle
        echo "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" >> main/build.gradle
        echo "}" >> main/build.gradle

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        
        # 4. 彻底修复冲突！改用高版本完美支持的 files() 精准引入方式
        echo "dependencies {" >> main/build.gradle
        echo "    implementation files('libs/cfdata.aar')" >> main/build.gradle
        echo "    implementation 'androidx.core:core-ktx:1.12.0'" >> main/build.gradle
        echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.11.0'" >> main/build.gradle
        echo "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" >> main/build.gradle
        echo "}" >> main/build.gradle

    # 8. 一键生成官方独立的 Gradle 8.4 包装器 (Wrapper) 
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的本地包装器执行无打断编译
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug -x lint -x test --warning-mode none

    # 10. 收集并上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
        echo "}" >> main/build.gradle
        echo "dependencies {" >> main/build.gradle
        echo "    implementation fileTree(dir: 'libs', include: ['*.aar'])" >> main/build.gradle
        echo "    implementation 'androidx.core:core-ktx:1.10.1'" >> main/build.gradle
        echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> main/build.gradle
        echo "    implementation 'com.google.android.material:material:1.9.0'" >> main/build.gradle
        echo "    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'" >> main/build.gradle
        echo "}" >> main/build.gradle

    # 8. 【核弹级绝杀】在当前目录一键生成官方独立的 Gradle 8.4 包装器 (Wrapper)
    # 彻底架空并抛弃系统全局那傲娇、脆弱的 9.5.1
    - name: Setup Independent Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 使用全新的、完全独立的、带绝对容错标识的本地包装器命令一键强行打包
    - name: Build APK with Gradle Wrapper
      run: |
        ./gradlew :main:assembleDebug --stacktrace --info -x lint -x test --warning-mode none

    # 10. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
