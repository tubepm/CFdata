name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 允许你在网页上一键手动点击触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 屏蔽 2026 年 Node 废弃警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Gomobile and Android Environment
      run: |
        # 安装官方移动编译工具
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init

    - name: Configure Go Module and Pull Dependencies
      run: |
        # 强制清理、初始化并补全 WebSocket 依赖包
        rm -f go.mod go.sum || true
        go mod init cfdata
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        # 正式开始对当前 package main 目录编译成安卓 APK 独立应用
        gomobile build -target=android -o cfdata.apk .

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
