name: Build Optimized APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install and Init Go Mobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          mkdir -p main/libs
          # 确保 bind 时加入 -ldflags="-s -w" 减少 Go 代码符号表
          gomobile bind -target=android/arm64 -androidapi 21 -javapkg com.cfdata -o main/libs/cfdata.aar -ldflags="-s -w" .

      - name: Generate Minimal Gradle Files
        run: |
          # 创建一个极其精简的 build.gradle
          printf '%s\n' \
          "plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }" \
          "android {" \
          "    namespace 'com.cfdata'; compileSdk 34;" \
          "    defaultConfig { applicationId 'com.cfdata'; minSdk 21; targetSdk 34; versionCode 1; versionName '1.0' }" \
          "    buildTypes { release { minifyEnabled true; shrinkResources true; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt') } }" \
          "    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }" \
          "}" \
          "dependencies { implementation files('libs/cfdata.aar') }" \
          > main/build.gradle

      - name: Build Optimized APK
        run: |
          # 使用 release 模式构建
          ./gradlew :main:assembleRelease --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimal-apk
          path: main/build/outputs/apk/release/*.apk
