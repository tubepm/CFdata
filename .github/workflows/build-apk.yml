name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Pure Code Environment
      run: |
        # 1. 彻底清除上几次残存的垃圾文件
        rm -f go.mod go.sum main.go || true
        
        # 2. 强行将你的 cfdata.go 恢复到最干净的原始代码状态
        git checkout -- cfdata.go || true

        # 3. 核心修复：防止 embed 找不到文件报错，若根目录下不存在 index.html 则自动创建一个
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>CFdata</title></head><body><h1>CFdata Android 后台已启动</h1></body></html>' > index.html
        fi

        # 4. 将第一行的 package cfdata 强行修改为符合 APK 独立编译要求的 package main
        sed -i '1s/^package .*/package main/' cfdata.go

        # 5. 终极参数补全：向文件末尾追加主引导，完美对齐 StartServer(int, string) 的双参数要求
        # 同时利用完整路径引入 app 依赖，不使用双引号，完美避开 YAML 网页红线
        echo "" >> cfdata.go
        echo "func main() {" >> cfdata.go
        echo "	go StartServer(8080, \"speed.cloudflare.com/__down?bytes=100000000\")" >> cfdata.go
        echo "	golang.org/x/mobile/app.Main(func(a golang.org/x/mobile/app.App) {" >> cfdata.go
        echo "		for range a.Events() {}" >> cfdata.go
        echo "	})" >> cfdata.go
        echo "}" >> cfdata.go

    - name: Initialize Modules
      run: |
        # 6. 重新生成并拉取依赖关系
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 7. 开始整包构建带核心后台逻辑的 APK
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
