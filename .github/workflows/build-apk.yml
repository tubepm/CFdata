name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Go Module and Entry Point
      run: |
        # 1. 如果仓库根目录没有 cfdata.go，则创建一个最小示例
        if [ ! -f cfdata.go ]; then
          cat > cfdata.go << 'EOF'
package main

import (
    "log"
    "golang.org/x/mobile/app"
)

func main() {
    app.Main(func(a app.App) {
        log.Println("CFdata Android App Started")
    })
}
EOF
        fi

        # 2. 强制将 cfdata.go 改为 package main，并重命名为 main.go（避免重复）
        sed -i '1s/^package .*/package main/' cfdata.go
        mv cfdata.go main.go

        # 3. 确保存在 main() 函数
        if ! grep -q "^func main()" main.go; then
          cat >> main.go << 'EOF'

func main() {
    // 请在此处调用您的实际业务逻辑
    // 例如: StartWebSocketServer()
}
EOF
        fi

        # 4. 确保 index.html 存在（如果代码中使用了 //go:embed）
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>CFdata</body></html>' > index.html
        fi

        # 5. 初始化 go module 并下载依赖
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        # -androidapi=21 解决 NDK 27 不支持 API 16 的问题
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
