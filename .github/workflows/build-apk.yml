name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (Android Gradle 编译必须)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 将你的 cfdata 编译绑定为标准的安卓原生插件包 (.aar)
    - name: Bind Go to Android Library
      run: |
        # 创建一个专门存放编译后依赖插件的目录
        mkdir -p main/libs
        gomobile bind -target=android/arm64 -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 【核心黑科技】在云端动态补齐缺失的 Android Studio 全套构建配置文件
    - name: Auto Generate Android Gradle Build Files
      run: |
        # 创建 main/build.gradle
        cat << 'EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        
        android {
            namespace 'com.cfdata'
            compileSdk 34
        
            defaultConfig {
                applicationId "com.cfdata"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        
        dependencies {
            // 自动引入上面用 gomobile 编出来的 Go 底层库
            implementation fileTree(dir: 'libs', include: ['*.aar'])
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF
        
        # 创建 main 目录下的 settings.gradle
        echo "rootProject.name = 'cfdata'" > main/settings.gradle

    # 8. 使用标准的系统原生 Gradle 命令一键融合打包，输出带精美图标的 APK
    - name: Build APK with System Gradle
      run: |
        cd main
        gradle assembleDebug

    # 9. 收集最终生成的精美 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
