name: Project Detector

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 让机器人帮我们看看到底有些什么文件夹，里面写了啥
    - name: Scan Project Structure
      run: |
        echo "=== 1. 当前项目的完整目录结构 ==="
        ls -R
        
        echo "=== 2. 查看 main 文件夹里的文件内容 ==="
        if [ -d "main" ]; then
          cd main
          ls -la
          echo "--- 打印 main 文件夹里 Go 文件的头部 ---"
          head -n 5 *.go 2>/dev/null || echo "main 文件夹里没有 go 文件"
        else
          echo "找不到名为 main 的文件夹"
        fi
