name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Run Build Script
      run: |
        # 使用 INNER_EOF 完美隔离，网页端 100% 浅灰色无红线
        cat << 'INNER_EOF' > build.sh
        #!/bin/bash
        rm -f go.mod go.sum main.go || true
        git checkout -- cfdata.go || true
        
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body><h1>CFdata Android Running</h1></body></html>' > index.html
        fi
        
        # 1. 修正包名为 package main
        sed -i '1s/^package .*/package main/' cfdata.go
        
        # 2. 关键修复：利用 sed 在原本的 import 块中插入标准的 app 依赖，避免直接写入带斜杠的路径
        sed -i '/import (/a \	"golang.org/x/mobile/app"' cfdata.go
        
        # 3. 在文件末尾追加纯正、标准的 func main 入口
        echo "" >> cfdata.go
        echo "func main() {" >> cfdata.go
        echo "	go StartServer(8080, \"speed.cloudflare.com/__down?bytes=100000000\")" >> cfdata.go
        echo "	app.Main(func(a app.App) {" >> cfdata.go
        echo "		for range a.Events() {}" >> cfdata.go
        echo "	})" >> cfdata.go
        echo "}" >> cfdata.go
        
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile/app
        go mod tidy
        INNER_EOF
        
        # 执行生成的构建脚本
        bash build.sh

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
