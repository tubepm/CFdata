    - name: Build APK with Gradle
      run: |
        # 1. 删除所有已有的 Gradle 状态和构建输出
        rm -rf .gradle/ build/ main/.gradle/ main/build/
        
        # 2. 使用绝对路径调用 gradle，并带上彻底禁用守护进程和缓存的参数
        # --no-build-cache: 禁用构建缓存
        # --no-daemon: 禁用守护进程，防止进程间污染
        # --stacktrace: 保持详细报错以便定位（如果还报错的话）
        gradle :main:assembleDebug --no-build-cache --no-daemon --stacktrace
