name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Go Module and Entry Point
      run: |
        # 1. 确保 cfdata.go 存在，如果不存在则创建最小示例
        if [ ! -f cfdata.go ]; then
          echo 'package cfdata' > cfdata.go
          echo '' >> cfdata.go
          echo 'func Start() { println("CFdata started") }' >> cfdata.go
        fi

        # 2. 强制将 cfdata.go 改为 package cfdata（不是 main）
        sed -i '1s/^package .*/package cfdata/' cfdata.go

        # 3. 生成一个符合 gomobile 要求的 main.go 入口
        cat > main.go << 'EOF'
package main

import (
    "log"
    "cfdata_app/cfdata"
    "golang.org/x/mobile/app"
)

func main() {
    app.Main(func(a app.App) {
        log.Println("CFdata Android App 启动")
        // 尝试调用 cfdata 包中的启动函数
        // 请根据您的实际函数名修改下面这一行（例如 Run()、Start()、Scan() 等）
        cfdata.Start()
    })
}
EOF

        # 4. 确保 index.html 存在（防止 //go:embed 报错）
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>CFdata</body></html>' > index.html
        fi

        # 5. 初始化 go.mod（模块名必须与 import 中的路径匹配）
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile@latest
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
