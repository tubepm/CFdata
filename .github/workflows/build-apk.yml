name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "26.2.11394342"

      - name: Export NDK Path
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.2.11394342" >> $GITHUB_ENV

      - name: Install Gomobile and Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Prepare Code & Entry File
        run: |
          rm -f go.mod go.sum gomobile_entry.go || true
          git checkout -- cfdata.go || true

          mkdir -p assets
          cp index.html assets/ || true
          [ -f locations.json ] && cp locations.json assets/

          sed -i '1s/^package .*/package main/' cfdata.go

          cat << 'EOF' > gomobile_entry.go
package main

import (
        "time"
        "golang.org/x/mobile/app"
        _ "golang.org/x/mobile/app"
)

func main() {
        go StartServer(8080, "speed.cloudflare.com/__down?bytes=100000000")

        app.Main(func(a app.App) {
                go func() {
                        time.Sleep(600 * time.Millisecond)
                        a.OpenURL("http://127.0.0.1:8080")
                }()
                for range a.Events() {}
        })
}
EOF

      - name: Go Mod Init & Tidy
        run: |
          go mod init main
          go get github.com/gorilla/websocket
          go get golang.org/x/mobile/app
          go mod tidy

      - name: Build Android APK
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile build -target=android -androidapi=21 -o cfdata.apk .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cfdata-apk
          path: cfdata.apk
