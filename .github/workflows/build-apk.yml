name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 生成 aar 插件
    - name: Bind Go to Android Library
      run: |
        mkdir -p main/libs
        gomobile bind -androidapi 21 -o main/libs/cfdata.aar .

    # 7. 全自动补全 Gradle 配置文件
    - name: Auto Generate Gradle Files
      run: |
        # 1. 顶层 settings.gradle
        cat << 'SETTING_EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        include ':main'
        SETTING_EOF
        
        # 2. 根目录 build.gradle
        cat << 'ROOT_EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
        }
        ROOT_EOF
        
        # 3. main 模块下的 build.gradle
        cat << 'APP_EOF' > main/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cfdata'
            compileSdk 34
            defaultConfig {
                applicationId 'com.cfdata'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
        }
        repositories {
            flatDir {
                dirs 'libs'
            }
        }
        dependencies {
            implementation(name: 'cfdata', ext: 'aar')
        }
        APP_EOF

    # 8. 生成 Gradle Wrapper
    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4 --distribution-type bin

    # 9. 执行编译
    - name: Build APK
      run: |
        ./gradlew :main:assembleDebug -x lint -x test

    # 10. 上传 Artifact
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: main/build/outputs/apk/debug/*.apk
