name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Pure Environment
      run: |
        rm -f go.mod go.sum main.go index.html || true
        
        if [ -f cfdata.go ]; then
          sed -i '/^package /d' cfdata.go
          sed -i '/^Package /d' cfdata.go
        fi

    - name: Create Main File
      run: |
        cat > main.go << 'EOF'
        package main
        
        import (
        	"embed"
        	"log"
        	"golang.org/x/mobile/app"
        )
        
        //go:embed index.html
        var fsys embed.FS
        
        func main() {
        	app.Main(func(a app.App) {
        		log.Println("App started")
        	})
        }
        EOF

    - name: Create HTML File
      run: |
        echo '<!DOCTYPE html><html><body>CFdata Android</body></html>' > index.html

    - name: Initialize Modules
      run: |
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
