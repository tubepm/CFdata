name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22

    - name: Setup Android NDK
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        gomobile init

    - name: Prepare source code
      run: |
        # 确保 cfdata.go 存在且为 package cfdata
        if [ ! -f cfdata.go ]; then
          echo 'package cfdata' > cfdata.go
          echo 'func Start() { println("ok") }' >> cfdata.go
        fi
        sed -i '1s/^package .*/package cfdata/' cfdata.go

        # 生成符合 gomobile 要求的 main.go
        cat > main.go << 'MAIN_EOF'
        package main

        import (
            "log"
            "cfdata_app/cfdata"
            "golang.org/x/mobile/app"
        )

        func main() {
            app.Main(func(a app.App) {
                log.Println("App started")
                cfdata.Start()
            })
        }
        MAIN_EOF

        # 创建占位 index.html
        if [ ! -f index.html ]; then
          echo '<html><body>CFdata</body></html>' > index.html
        fi

        # 初始化 go module
        rm -f go.mod go.sum
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile@latest
        go mod tidy

    - name: Build APK
      run: |
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
