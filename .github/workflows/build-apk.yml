name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Go Module and Entry Point
      run: |
        # 1. 如果 cfdata.go 不存在，则用 printf 创建最小示例
        if [ ! -f cfdata.go ]; then
          printf '%s\n' 'package main' '' 'import (' '    "log"' '    "golang.org/x/mobile/app"' ')' '' 'func main() {' '    app.Main(func(a app.App) {' '        log.Println("CFdata Android App Started")' '    })' '}' > cfdata.go
        fi

        # 2. 强制改为 package main 并重命名为 main.go
        sed -i '1s/^package .*/package main/' cfdata.go
        mv cfdata.go main.go

        # 3. 如果没有 main 函数则追加
        if ! grep -q "^func main()" main.go; then
          printf '\nfunc main() {\n    // 请在此处调用实际业务逻辑\n}\n' >> main.go
        fi

        # 4. 确保 index.html 存在
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>CFdata</body></html>' > index.html
        fi

        # 5. 初始化 go.mod
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
