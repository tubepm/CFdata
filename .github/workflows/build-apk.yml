name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Clean And Restore Code
      run: |
        # 1. 彻底清除残留
        rm -f go.mod go.sum main.go index.html || true
        
        # 2. 强行把你的 cfdata.go 恢复到原始健康状态
        git checkout -- cfdata.go || true

        # 3. 确保第一行包名合规
        sed -i '1s/^Package .*/package main/' cfdata.go
        sed -i '1s/^package .*/package main/' cfdata.go

        # 4. 创建静态 index.html
        echo '<!DOCTYPE html><html><body>CFdata Android Service Running</body></html>' > index.html

    - name: Auto Create Main Entry
      run: |
        # 5. 核心修复：在 main.go 中开启后台协程，拉起你的 StartServer 服务
        echo 'package main' > main.go
        echo 'import (' >> main.go
        echo '    "golang.org/x/mobile/app"' >> main.go
        echo '    "log"' >> main.go
        echo ')' >> main.go
        echo 'func main() {' >> main.go
        echo '    # 在后台异步启动你的测速核心服务，防止阻塞安卓主线程' >> main.go
        echo '    go func() {' >> main.go
        echo '        log.Println("正在启动 Cloudflare 核心服务...")' >> main.go
        echo '        # 如果你的启动函数不叫 StartServer，请把下面这行改成你真实的函数名' >> main.go
        echo '        err := StartServer(8080, "speed.cloudflare.com/__down?bytes=100000000")' >> main.go
        echo '        if err != nil {' >> main.go
        echo '            log.Println("服务运行异常:", err)' >> main.go
        echo '        }' >> main.go
        echo '    }()' >> main.go
        echo '    ' >> main.go
        echo '    # 维持安卓应用的生命周期壳子' >> main.go
        echo '    app.Main(func(a app.App) {' >> main.go
        echo '        switch a.Lifecycle() {}' >> main.go
        echo '    })' >> main.go
        echo '}' >> main.go

    - name: Initialize Modules
      run: |
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 6. 打包输出
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
