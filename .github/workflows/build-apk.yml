name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22

    - name: Setup Android NDK
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | sort -V | tail -n1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK=$NDK_PATH" >> $GITHUB_ENV
        echo "Found NDK: $NDK_PATH"

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Init gomobile
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

    - name: Prepare source code
      run: |
        # 1. 使用仓库中的 cfdata.go（已修改为无 embed 版本）
        # 确保 package 是 cfdata
        sed -i '1s/^package .*/package cfdata/' cfdata.go

        # 2. 创建 main.go 作为 Android 入口
        cat > main.go << 'MAIN_EOF'
        package main

        import (
            "log"
            "cfdata_app/cfdata"
            "golang.org/x/mobile/app"
        )

        func main() {
            app.Main(func(a app.App) {
                log.Println("App started")
                cfdata.StartServer(8080, "")
            })
        }
        MAIN_EOF

        # 3. 创建占位 index.html（gomobile 构建需要文件存在）
        if [ ! -f index.html ]; then
          echo '<html><body>CFdata</body></html>' > index.html
        fi

        # 4. 初始化 go module
        rm -f go.mod go.sum
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile@latest
        go mod tidy

    - name: Build APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile build -target=android -androidapi=21 -o cfdata.apk .
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
