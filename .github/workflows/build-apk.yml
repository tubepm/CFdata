name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境 (Android NDK 必备底座)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 下载官方 Android NDK
    - name: Install Android NDK via SDKManager
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    # 5. 安装并配置 gomobile
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Initialize Go Mobile
      run: |
        gomobile init

    # 6. 【安全修改】动态修复源码包名，并安全追加主入口函数
    - name: Inject Android App Lifecycle into Go
      run: |
        # 1. 强行把 package cfdata 替换成 package main
        sed -i 's/package cfdata/package main/g' cfdata.go
        
        # 2. 使用最安全的单行 echo 方式追加代码，彻底规避多行文本导致的 YAML 语法拦截
        echo "" >> cfdata.go
        echo 'import "golang.org/x/mobile/app"' >> cfdata.go
        echo "" >> cfdata.go
        echo "func main() {" >> cfdata.go
        echo "	go StartServer(8080, \"127.0.0.1\")" >> cfdata.go
        echo "	app.Main(func(a app.App) {" >> cfdata.go
        echo "		for range a.Events() {" >> cfdata.go
        echo "		}" >> cfdata.go
        echo "	})" >> cfdata.go
        echo "}" >> cfdata.go
        
        echo "=== 检查修改后的 Go 文件末尾 15 行 ==="
        tail -n 15 cfdata.go

    # 7. 越过所有 Gradle 垃圾配置，直接使用 Go 交叉编译引擎生成 APK！
    - name: Pure Go Build APK
      run: |
        gomobile build -target=android -androidapi 21 -o cfdata.apk .

    # 8. 上传最终生成的 APK 安装包
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
