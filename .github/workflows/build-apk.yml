name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 屏蔽 Node 20 废弃警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        # 自动寻找 NDK 路径
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Go Module and Entry Point
      run: |
        # 1. 确保 cfdata.go 存在（若不存在则创建一个最小可运行版本）
        if [ ! -f cfdata.go ]; then
          cat > cfdata.go <<'EOF'
package main

import (
	"log"
	"golang.org/x/mobile/app"
)

func main() {
	app.Main(func(a app.App) {
		// 空实现，保证编译通过
		log.Print("App started")
	})
}
EOF
        fi

        # 2. 复制并强制转换为 package main
        cp cfdata.go main.go
        sed -i '1s/^package .*/package main/' main.go

        # 3. 确保存在 main() 函数（若缺失则追加一个）
        if ! grep -q "^func main()" main.go; then
          cat >> main.go <<'EOF'

func main() {
	// 默认入口，可在此调用你的业务逻辑
	startApp()
}
EOF
        fi

        # 4. 确保 index.html 存在（如果代码中使用了 //go:embed）
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>Hello from Go+Android</body></html>' > index.html
        fi

        # 5. 初始化 go.mod
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        # 关键修复：指定 API 级别 21 以兼容 NDK 27+
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
