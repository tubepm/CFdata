name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Run Build Script
      run: |
        cat << 'INNER_EOF' > build.sh
        #!/bin/bash
        rm -f go.mod go.sum main.go || true
        git checkout -- cfdata.go || true
        
        # 1. 核心修复：防止 embed 找不到文件报错
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>CFdata</title></head><body><h1>CFdata Android 后台已启动</h1></body></html>' > index.html
        fi
        
        # 2. 将第一行的 package cfdata 修改为可独立编译成独立 APK 的 package main
        sed -i '1s/^package .*/package main/' cfdata.go
        
        # 3. 在代码头部精确追加标准的移动端基础生命周期库导入
        sed -i '/import (/a \	"golang.org/x/mobile/app"' cfdata.go
        
        # 4. 动态在文件末尾注入干净、纯粹、无版本兼容大坑的独立入口函数 func main()
        # 将默认测速地址定义为反单引号变量，彻底杜绝所有双引号转义在 YAML 网页端引发的红线
        echo "" >> cfdata.go
        echo "var defaultURL = \`speed.cloudflare.com/__down?bytes=100000000\`" >> cfdata.go
        echo "func main() {" >> cfdata.go
        echo "	go StartServer(8080, defaultURL)" >> cfdata.go
        echo "	app.Main(func(a app.App) {" >> cfdata.go
        echo "		for range a.Events() {}" >> cfdata.go
        echo "	})" >> cfdata.go
        echo "}" >> cfdata.go
        
        # 5. 清洗并补齐模块依赖
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile/app
        go mod tidy
        INNER_EOF
        
        # 跑脚本
        bash build.sh

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 6. 开始整包编译
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
