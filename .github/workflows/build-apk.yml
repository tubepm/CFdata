name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: 25.2.9519653

      - name: Set NDK path
        run: |
          NDK=$ANDROID_HOME/ndk/25.2.9519653
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "NDK=$NDK" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
          gomobile init

      - name: Prepare build files
        run: |
          # 清理旧文件
          rm -f go.mod go.sum main.go entry.go || true

          # 把 cfdata.go 改成 package main
          sed -i '1s/^package cfdata/package main/' cfdata.go

          # 生成 gomobile 入口
          cat > entry.go << 'EOF'
package main

import (
  "time"
  "golang.org/x/mobile/app"
)

func main() {
  go StartServer(8080, "speed.cloudflare.com/__down?bytes=100000000")

  app.Main(func(a app.App) {
    go func() {
      time.Sleep(600 * time.Millisecond)
      a.OpenURL("http://127.0.0.1:8080")
    }()
    for range a.Events() {}
  })
}
EOF

      - name: Go mod init & tidy
        run: |
          go mod init cfdata
          go get github.com/gorilla/websocket
          go get golang.org/x/mobile/app
          go mod tidy

      - name: Build APK
        run: |
          gomobile build -target=android -androidapi=21 -o cfdata.apk .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cfdata-apk
          path: cfdata.apk
