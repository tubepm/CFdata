name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Architecture Environment
      run: |
        # 1. 彻底清除上几次残存的碎片垃圾文件
        rm -f go.mod go.sum main.go || true
        
        # 2. 强行将你的 cfdata.go 恢复到你代码库里最新、最纯净的原始代码状态
        git checkout -- cfdata.go || true
        
        # 3. 将第一行的 package cfdata 变更为标准的 package main，满足编译独立 APK 的铁律
        sed -i '1s/^package .*/package main/' cfdata.go
        
        # 4. 终极闭环补齐：在最末尾静默追加一个匿名 import 块和主入口
        # 利用 Go 语言的 _ "golang.org/x/mobile/app" 满足 gomobile 的硬性编译条件
        # 同时利用反单引号作为测速链接参数，彻底避开 YAML 网页端的所有转义高亮大坑，全站零红线！
        if ! grep -q "func main()" cfdata.go; then
          echo "" >> cfdata.go
          echo "import _ \`golang.org/x/mobile/app\`" >> cfdata.go
          echo "func main() {" >> cfdata.go
          echo "	StartServer(8080, \`speed.cloudflare.com/__down?bytes=100000000\`)" >> cfdata.go
          echo "}" >> cfdata.go
        fi

    - name: Initialize Modules
      run: |
        # 5. 用主模块环境重新梳理依赖链并拉取必要依赖
        go mod init main
        go get github.com/gorilla/websocket
        go get golang.org/x/mobile/app
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 6. 开始整包构建，输出带你最新功能的完整成品 APK
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
