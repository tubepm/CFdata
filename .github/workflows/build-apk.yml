name: Build Android APK

# 触发条件：当推送到 main 或 master 分支，或者手动触发时
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出你的源代码
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. 设置 Go 语言环境（根据你的 go.mod 要求设置 1.25.0）
    - name: Set up Go
      uses: actions/board-n-testers/setup-go@v5
      with:
        go-version: '1.25.0'

    # 3. 设置 Java 环境（Android 编译依赖 Java）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 4. 设置 Android NDK（gomobile 交叉编译必不可少）
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      # 提示：GitHub 的 ubuntu-latest 镜像通常默认自带 NDK，
      # 如果提示找不到，可以通过此 Step 显式指定版本。

    # 5. 安装 gomobile 工具
    - name: Install Go Mobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    # 6. 初始化 gomobile (关联 NDK 路径)
    - name: Initialize Go Mobile
      run: |
        # 使用 GitHub 环境变量中自带的 Android NDK 路径
        gomobile init -ndk $ANDROID_NDK_HOME

    # 7. 编译生成 APK
    - name: Build APK
      run: |
        # 注意：这里的 ./main 应该指向你存放 main 函数（package main）的文件夹路径
        # 如果你的 main 函数就在根目录，请把 ./main 改成 .
        gomobile build -target=android -o cfdata.apk ./main

    # 8. 将编译好的 APK 上传到 GitHub，供你下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cloudflare-ip-data-apk
        path: cfdata.apk
