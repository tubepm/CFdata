name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已设为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Pure Environment
      run: |
        # 1. 彻底清除上几次残留的生成文件，让工作区绝对干净
        rm -f go.mod go.sum main.go index.html || true
        
        # 2. 丢弃由于之前执行过 sed 导致损坏的临时状态，重新拉取一份你仓库里完好的代码
        git checkout -- cfdata.go || true

        # 3. 强制确保你的核心 cfdata.go 首行是标准的 package main，这次不删除，只做大小写和名称替换
        sed -i 's/^Package main/package main/g' cfdata.go
        sed -i 's/^package cfdata/package main/g' cfdata.go

        # 4. 确保 index.html 存在，防止 //go:embed index.html 报错
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body>CFdata Android Running</body></html>' > index.html
        fi

    - name: Initialize Modules
      run: |
        # 将模块初始化为 main 模块
        go mod init main
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 5. 直接使用 "." 编译当前整包，同时带上你指定的 API 21 兼容参数
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
