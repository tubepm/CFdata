name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:      # 支持手动一键触发编译

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 屏蔽 2026 年 Node 废弃警告

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Android NDK Env
      run: |
        # 自动寻找并绑定 GitHub 虚拟机自带的 NDK 路径
        NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
        echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
        echo "NDK 路径已自动绑定为: $NDK_PATH"

    - name: Install Gomobile and Tools
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        go install golang.org/x/mobile/cmd/gobind@latest
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        gomobile init

    - name: Prepare Go Module and Entry Point
      run: |
        # 1. 强制纠正原本 cfdata.go 里的包名，统一清洗为标准的 package main
        if [ -f cfdata.go ]; then
          sed -i 's/^Package main/package main/g' cfdata.go
          sed -i 's/^package cfdata/package main/g' cfdata.go
        else
          echo "错误：未能在仓库根目录下找到核心代码文件 cfdata.go！"
          exit 1
        fi

        # 2. 清理残余的多余 main.go 文件，防止产生冲突
        rm -f main.go || true

        # 3. 兜底保护：检查 cfdata.go 中是否确实包含 func main()，如果没有则在末尾追加
        if ! grep -q "func main()" cfdata.go; then
          cat >> cfdata.go << 'EOF'

func main() {
    // 自动追加的安卓端服务启动入口
    err := StartServer(8080, "speed.cloudflare.com/__down?bytes=100000000")
    if err != nil {
        println("服务启动失败:", err.Error())
    }
}
EOF
        fi

        # 4. 确保 index.html 存在，防止 //go:embed index.html 报错
        if [ ! -f index.html ]; then
          echo '<!DOCTYPE html><html><body><h1>CFdata Android 运行中</h1></body></html>' > index.html
        fi

        # 5. 规范化配置 Go Module 并拉取最新的 WebSocket 依赖包
        rm -f go.mod go.sum || true
        go mod init cfdata_app
        go get github.com/gorilla/websocket
        go mod tidy

    - name: Build Android APK
      run: |
        export PATH=$PATH:$(go env GOPATH)/bin
        export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
        
        # 6. 使用点号 "." 编译当前整包，同时带上你指定的兼容参数
        gomobile build -target=android -androidapi=21 -o cfdata.apk .

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cfdata-apk
        path: cfdata.apk
