name: Build CFdata APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 设置 Java 17
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 设置 Android SDK
      - uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 25.2.9519653

      # 设置 Go
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 安装 gomobile
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      # 编译 Go 为 AAR
      - name: Build Go AAR
        run: |
          mkdir -p main/libs
          gomobile bind -v -o main/libs/cfdata.aar -target=android ./
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      # 创建缺失的 Gradle 文件
      - name: Setup Gradle files
        run: |
          # 项目级 build.gradle
          cat > build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          GRADLE

          # settings.gradle
          cat > settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  flatDir { dirs 'libs' }
              }
          }
          rootProject.name = "CFdata"
          include ':main'
          GRADLE

          # main/build.gradle
          cat > main/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.cfdata'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cfdata"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          repositories {
              flatDir { dirs 'libs' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation(name: 'cfdata', ext: 'aar')
          }
          GRADLE

          # Gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # 下载 wrapper 脚本
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o gradlew
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew.bat -o gradlew.bat
          chmod +x gradlew

      # 编译 Debug APK
      - name: Build Debug APK
        run: ./gradlew :main:assembleDebug

      # 编译 Release APK
      - name: Build Release APK
        run: ./gradlew :main:assembleRelease

      # 上传 Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-debug
          path: main/build/outputs/apk/debug/*.apk

      # 上传 Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-release
          path: main/build/outputs/apk/release/*.apk
