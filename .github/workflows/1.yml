name: Build CFdata APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      # 安装gomobile兼容的NDK r21e
      - name: Setup NDK r21e
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
          link-to-sdk: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 修复cfdata.go的重复代码问题
      - name: Fix cfdata.go duplicate code
        run: |
          echo "检查cfdata.go中的重复函数..."
          grep -n "^func dataPath" cfdata.go || true
          
          # 找到第二个 dataPath 函数的位置
          SECOND_DATAPATH=$(grep -n "^func dataPath" cfdata.go | tail -1 | cut -d: -f1)
          FIRST_DATAPATH=$(grep -n "^func dataPath" cfdata.go | head -1 | cut -d: -f1)
          
          echo "第一个 dataPath 在第 $FIRST_DATAPATH 行"
          echo "第二个 dataPath 在第 $SECOND_DATAPATH 行"
          
          if [ "$SECOND_DATAPATH" != "$FIRST_DATAPATH" ]; then
            echo "发现重复代码，删除第 $SECOND_DATAPATH 行之后的内容..."
            head -n $((SECOND_DATAPATH - 1)) cfdata.go > cfdata.go.tmp
            mv cfdata.go.tmp cfdata.go
            echo "修复完成"
          fi
          
          # 验证修复
          echo "修复后的函数列表："
          grep -n "^func " cfdata.go

      # 编译Go AAR
      - name: Build Go AAR
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$HOME/go/bin:$PATH
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          echo "Using NDK: $ANDROID_NDK_HOME"
          gomobile init
          mkdir -p main/libs
          gomobile bind -v -o main/libs/cfdata.aar -target=android ./

      # 创建Gradle wrapper
      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          echo 'distributionBase=GRADLE_USER_HOME' > gradle/wrapper/gradle-wrapper.properties
          echo 'distributionPath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
          echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip' >> gradle/wrapper/gradle-wrapper.properties
          echo 'networkTimeout=10000' >> gradle/wrapper/gradle-wrapper.properties
          echo 'zipStoreBase=GRADLE_USER_HOME' >> gradle/wrapper/gradle-wrapper.properties
          echo 'zipStorePath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew.bat" -o gradlew.bat
          chmod +x gradlew

      - name: Setup Gradle Build Files
        run: |
          echo 'cGx1Z2lucyB7CiAgICBpZCAiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iIHZlcnNpb24gIjguMi4wIiBhcHBseSBmYWxzZQp9Cg==' | base64 -d > build.gradle
          echo '' | base64 -d > settings.gradle
          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDhtCg==' | base64 -d > gradle.properties
          echo '' | base64 -d > main/build.gradle
          echo '-keep class com.cfdata.** { *; }' > main/proguard-rules.pro

      - name: Build Release APK
        run: ./gradlew :main:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-release
          path: main/build/outputs/apk/release/*.apk
