          P

          # main/build.gradle
          cat > main/build.gradle << 'G'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.cfdata'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cfdata"
                  minSdk 21
