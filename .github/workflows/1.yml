              implementation(name: 'cfdata', ext: 'aar')
          }
          G

      # 编译Debug APK
      - name: Build Debug APK
        run: ./gradlew :main:assembleDebug --stacktrace

      # 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-test
