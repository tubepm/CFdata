name: Build CFdata APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Setup NDK r21e
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
          link-to-sdk: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fix cfdata.go duplicate code
        run: |
          echo "=== 开始修复 cfdata.go ==="

          if [ ! -f cfdata.go ]; then
            echo "错误: cfdata.go 不存在!"
            exit 1
          fi

          TOTAL_LINES=$(wc -l < cfdata.go)
          echo "总行数: $TOTAL_LINES"

          # 方法1：找到 "return filepath.Join(dataDir, name)" 的位置
          JOIN_LINE=$(grep -n "return filepath.Join(dataDir, name)" cfdata.go | tail -1 | cut -d: -f1)
          echo "'return filepath.Join(dataDir, name)' 在第 $JOIN_LINE 行"

          # 方法2：找到 "func getRandomIPv6s" 函数结束的位置
          # 通过查找 "return randomIPs" 或 "}" 来定位

          # 方法3：直接删除第751行之后的内容（如果总行数>751）
          if [ "$TOTAL_LINES" -gt 751 ]; then
            echo "文件超过751行，删除第751行之后的内容"
            head -n 750 cfdata.go > cfdata.go.tmp
            mv cfdata.go.tmp cfdata.go
            echo "修复完成，新行数: $(wc -l < cfdata.go)"
          fi

          echo "=== 修复后文件末尾 ==="
          tail -20 cfdata.go
          echo "=== 修复完成 ==="

      - name: Build Go AAR
        run: |
          echo "=== 开始编译 Go AAR ==="
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$HOME/go/bin:$PATH
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          echo "Using NDK: $ANDROID_NDK_HOME"
          gomobile init
          mkdir -p main/libs
          gomobile bind -v -o main/libs/cfdata.aar -target=android ./
          echo "=== Go AAR 编译完成 ==="

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          echo 'distributionBase=GRADLE_USER_HOME' > gradle/wrapper/gradle-wrapper.properties
          echo 'distributionPath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
          echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip' >> gradle/wrapper/gradle-wrapper.properties
          echo 'networkTimeout=10000' >> gradle/wrapper/gradle-wrapper.properties
          echo 'zipStoreBase=GRADLE_USER_HOME' >> gradle/wrapper/gradle-wrapper.properties
          echo 'zipStorePath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew" -o gradlew
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew.bat" -o gradlew.bat
          chmod +x gradlew

      - name: Setup Gradle Build Files
        run: |
          echo 'cGx1Z2lucyB7CiAgICBpZCAiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iIHZlcnNpb24gIjguMi4wIiBhcHBseSBmYWxzZQp9Cg==' | base64 -d > build.gradle
          echo '' | base64 -d > settings.gradle
          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDhtCg==' | base64 -d > gradle.properties
          echo '' | base64 -d > main/build.gradle
          echo '-keep class com.cfdata.** { *; }' > main/proguard-rules.pro

      - name: Build Release APK
        run: ./gradlew :main:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-release
          path: main/build/outputs/apk/release/*.apk
