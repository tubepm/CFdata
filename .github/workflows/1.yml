          echo '        sourceCompatibility JavaVersion.VERSION_17' >> main/build.gradle
          echo '        targetCompatibility JavaVersion.VERSION_17' >> main/build.gradle
          echo '    }' >> main/build.gradle
          echo '}' >> main/build.gradle
          echo 'dependencies {' >> main/build.gradle
          echo '    implementation "androidx.appcompat:appcompat:1.6.1"' >> main/build.gradle
          echo '    implementation(name: "cfdata", ext: "aar")' >> main/build.gradle
          echo '}' >> main/build.gradle

      - name: Build Debug APK
        run: ./gradlew :main:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-test
          path: main/build/outputs/apk/debug/*.apk
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation(name: 'cfdata', ext: 'aar')
          }
          G

      # 编译Debug APK
      - name: Build Debug APK
        run: ./gradlew :main:assembleDebug --stacktrace

      # 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CFdata-test
          path: main/build/outputs/apk/debug/*.apk
                  mavenCentral()
                  flatDir { dirs 'main/libs' }
              }
          }
          rootProject.name = "CFdata"
          include ':main'
          G

          # gradle.properties
          cat > gradle.properties << 'P'
          android.useAndroidX=true
