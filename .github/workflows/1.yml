name: Build APK with Go Module

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  JAVA_VERSION: '17'
  ANDROID_API_LEVEL: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  NDK_VERSION: '25.2.9519653'

jobs:
  build-go-aar:
    name: Build Go AAR Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_PATH

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init -v
        env:
          GOPROXY: https://proxy.golang.org,direct

      - name: Build Go AAR (arm64-v8a, armeabi-v7a, x86_64)
        run: |
          mkdir -p android/libs
          gomobile bind -v -o android/libs/cfdata.aar -target=android/arm,android/arm64,android/386,android/amd64 ./
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfdata-aar
          path: android/libs/cfdata.aar
          retention-days: 1

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-go-aar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Download Go AAR
        uses: actions/download-artifact@v4
        with:
          name: cfdata-aar
          path: main/libs/

      - name: Create Gradle build files
        run: |
          # 创建项目级 build.gradle
          cat > build.gradle << 'EOF'
          // Top-level build file
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  flatDir {
                      dirs 'libs'
                  }
              }
          }
          EOF

          # 创建 settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  flatDir {
                      dirs 'libs'
                  }
              }
          }

          rootProject.name = "CFdata"
          include ':main'
          EOF

          # 创建 gradle wrapper
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # 下载 gradle wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o gradlew
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew.bat -o gradlew.bat
          chmod +x gradlew

          # 创建 main 模块的 build.gradle
          cat > main/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.cfdata'
              compileSdk ${{ env.ANDROID_API_LEVEL }}

              defaultConfig {
                  applicationId "com.cfdata"
                  minSdk 21
                  targetSdk ${{ env.ANDROID_API_LEVEL }}
                  versionCode 1
                  versionName "1.0"

                  ndk {
                      abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          repositories {
              flatDir {
                  dirs 'libs'
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation(name: 'cfdata', ext: 'aar')
          }
          EOF

          # 创建空 proguard 文件
          touch main/proguard-rules.pro

      - name: Build Debug APK
        run: ./gradlew :main:assembleDebug

      - name: Build Release APK (unsigned)
        run: ./gradlew :main:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: main/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: main/build/outputs/apk/release/*.apk
